<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Application</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary-color: #4a6fa5;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Prevent scrolling when quiz is paused */
        body.quiz-paused {
            overflow: hidden;
            height: 100vh;
        }

        .quiz-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            padding: 30px;
            position: relative;
        }

        /* Fixed scrolling container logic for paused state */
        .quiz-content-wrapper {
            max-height: 70vh;
            overflow-y: auto;
            transition: opacity 0.3s ease;
        }

        body.quiz-paused .quiz-content-wrapper {
            overflow: hidden; /* Blocks scrolling on active area when paused */
            opacity: 0.2;
            pointer-events: none; /* Disables interaction */
        }

        .question {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            padding: 14px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1rem;
            background: #fff;
        }

        .option:hover:not(.disabled) {
            background-color: #f8f9fa;
            border-color: var(--primary-color);
        }

        /* Post-submit review styling states */
        .option.correct-answer {
            background-color: #d4edda !important;
            border-color: var(--success-color) !important;
            color: #155724;
            font-weight: 600;
        }

        .option.wrong-answer {
            background-color: #f8d7da !important;
            border-color: var(--error-color) !important;
            color: #721c24;
        }

        .option.disabled {
            cursor: not-allowed;
        }

        /* FIX 1: Action Button Container Padding/Margin Tweak */
        .action-container {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background 0.2s;
        }

        .btn-primary { background: var(--primary-color); color: white; }
        .btn-primary:hover { background: #3b5984; }
        .btn-success { background: var(--success-color); color: white; }
        .btn-success:hover { background: #27ae60; }

        /* FIX 4: Vertically stacked layout for Pause/Resume Overlays */
        .pause-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            display: flex;
            flex-direction: column; /* Vertically Stacked */
            justify-content: center;
            align-items: center;
            gap: 20px; /* Clean spacing between vertical elements */
            z-index: 10;
        }

        .pause-title {
            font-size: 1.8rem;
            color: #333;
            font-weight: bold;
            margin: 0;
        }

        .hidden { display: none !important; }
        .results-screen { text-align: center; }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div id="pauseOverlay" class="pause-overlay hidden">
            <h2 class="pause-title">Quiz Suspended</h2>
            <button class="btn btn-primary" onclick="resumeQuiz()">Resume Quiz</button>
        </div>

        <div id="quizContent" class="quiz-content-wrapper">
            <div id="questionContainer">
                <div id="questionText" class="question">Loading question...</div>
                <div id="optionsList" class="options-container"></div>
            </div>

            <div id="resultsContainer" class="results-screen hidden">
                <h2>Quiz Completed!</h2>
                <p id="scoreText"></p>
            </div>
        </div>

        <div class="action-container" id="actionPanel">
            <button id="pauseBtn" class="btn btn-primary" onclick="pauseQuiz()">Pause</button>
            <button id="nextBtn" class="btn btn-success" onclick="nextQuestion()">Submit Answer</button>
            <button id="downloadBtn" class="btn btn-primary hidden" onclick="generatePDF()">Download PDF (Q&A)</button>
        </div>
    </div>

    <script>
        // Sample Quiz Data Structure
        const quizData = [
            {
                question: "Which programming language is primarily used for web styling?",
                options: ["Python", "C++", "CSS", "HTML"],
                correct: 2
            },
            {
                question: "What does API stand for?",
                options: ["Application Programming Interface", "Applied Process Integration", "Automated Program Information", "Application Processor Interconnect"],
                correct: 0
            },
            {
                question: "Which database is explicitly NoSQL?",
                options: ["MySQL", "PostgreSQL", "MongoDB", "SQLite"],
                correct: 2
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let userAnswers = []; // Tracks selected indexes
        let isAnswered = false;
        let isPaused = false;

        function initQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            userAnswers = [];
            isAnswered = false;
            loadQuestion();
        }

        function loadQuestion() {
            isAnswered = false;
            document.getElementById("nextBtn").innerText = "Submit Answer";
            
            const currentQuestion = quizData[currentQuestionIndex];
            document.getElementById("questionText").innerText = `${currentQuestionIndex + 1}. ${currentQuestion.question}`;
            
            const optionsList = document.getElementById("optionsList");
            optionsList.innerHTML = "";

            currentQuestion.options.forEach((option, index) => {
                const button = document.createElement("div");
                button.className = "option";
                button.innerText = option;
                button.onclick = () => selectOption(index, button);
                optionsList.appendChild(button);
            });
        }

        function selectOption(selectedIndex, element) {
            if (isAnswered || isPaused) return;

            // Clear previous selections
            const options = document.querySelectorAll(".option");
            options.forEach(opt => opt.style.borderColor = "#e0e0e0");

            // Highlight chosen item locally before submission confirmation
            element.style.borderColor = "var(--primary-color)";
            userAnswers[currentQuestionIndex] = selectedIndex;
        }

        function nextQuestion() {
            if (userAnswers[currentQuestionIndex] === undefined) {
                alert("Please select an option before proceeding!");
                return;
            }

            // FIX 3: Review Phase (Show Right/Wrong Option details visually)
            if (!isAnswered) {
                isAnswered = true;
                const currentQuestion = quizData[currentQuestionIndex];
                const selectedIndex = userAnswers[currentQuestionIndex];
                const options = document.querySelectorAll(".option");

                options.forEach((optElement, idx) => {
                    optElement.classList.add("disabled");
                    
                    // Mark correct options green, mark user errors red
                    if (idx === currentQuestion.correct) {
                        optElement.classList.add("correct-answer"); // True answer
                    } else if (idx === selectedIndex) {
                        optElement.classList.add("wrong-answer"); // User picked incorrect choice
                    }
                });

                if (selectedIndex === currentQuestion.correct) {
                    score++;
                }

                document.getElementById("nextBtn").innerText = currentQuestionIndex === quizData.length - 1 ? "Finish Quiz" : "Next Question";
                return;
            }

            // Transition logic forward
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        // FIX 5: Scroll Lock Implementation when active quiz state is paused
        function pauseQuiz() {
            isPaused = true;
            document.getElementById("pauseOverlay").classList.remove("hidden");
            document.body.classList.add("quiz-paused"); // Triggers CSS scroll prevention hooks
        }

        function resumeQuiz() {
            isPaused = false;
            document.getElementById("pauseOverlay").classList.add("hidden");
            document.body.classList.remove("quiz-paused");
        }

        function showResults() {
            document.getElementById("questionContainer").classList.add("hidden");
            document.getElementById("resultsContainer").classList.remove("hidden");
            document.getElementById("scoreText").innerText = `You scored ${score} out of ${quizData.length}`;
            
            document.getElementById("pauseBtn").classList.add("hidden");
            document.getElementById("nextBtn").classList.add("hidden");
            document.getElementById("downloadBtn").classList.remove("hidden");
        }

        // FIX 2: Generate PDF detailing entire compilation of actual Questions & Selected Answers
        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFont("Helvetica", "bold");
            doc.setFontSize(20);
            doc.text("Quiz Review Worksheet", 20, 20);
            
            doc.setFontSize(12);
            doc.setFont("Helvetica", "normal");
            doc.text(`Final Calculated Score: ${score} / ${quizData.length}`, 20, 30);
            doc.line(20, 35, 190, 35);

            let yPosition = 45;

            quizData.forEach((item, index) => {
                if (yPosition > 260) { // Safety page breaking ceiling check
                    doc.addPage();
                    yPosition = 20;
                }

                doc.setFont("Helvetica", "bold");
                doc.text(`${index + 1}. ${item.question}`, 20, yPosition);
                yPosition += 8;

                doc.setFont("Helvetica", "normal");
                const userSelectionIdx = userAnswers[index];
                const userTextAnswer = userSelectionIdx !== undefined ? item.options[userSelectionIdx] : "Unanswered";
                const correctTextAnswer = item.options[item.correct];

                doc.text(`Your Selection: ${userTextAnswer}`, 25, yPosition);
                yPosition += 6;
                doc.text(`Correct Solution: ${correctTextAnswer}`, 25, yPosition);
                
                // Add a small status note marker text block
                yPosition += 6;
                doc.setFont("Helvetica", "italic");
                if(userSelectionIdx === item.correct) {
                    doc.text("Result Status: CORRECT", 25, yPosition);
                } else {
                    doc.text("Result Status: INCORRECT", 25, yPosition);
                }
                
                doc.setFont("Helvetica", "normal");
                yPosition += 12; // Gap spacing before printing next question context blocks
            });

            doc.save("Quiz_Performance_Report.pdf");
        }

        // Initialize App runtime setup instance
        window.onload = initQuiz;
    </script>
</body>
</html>
